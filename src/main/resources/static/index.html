<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen KTP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Sistem Manajemen KTP</h1>
            <p>Kelola data kependudukan dengan mudah dan cepat</p>
        </header>

        <section class="form-section">
            <div class="card">
                <h2 id="form-title">Tambah Data KTP</h2>
                <form id="ktpForm">
                    <input type="hidden" id="ktpId">
                    <div class="form-group">
                        <label for="nomorKtp">Nomor KTP</label>
                        <input type="text" id="nomorKtp" placeholder="Masukkan 16 digit No. KTP" required>
                    </div>
                    <div class="form-group">
                        <label for="namaLengkap">Nama Lengkap</label>
                        <input type="text" id="namaLengkap" placeholder="Masukkan Nama Lengkap" required>
                    </div>
                    <div class="form-group">
                        <label for="alamat">Alamat</label>
                        <textarea id="alamat" placeholder="Masukkan Alamat Lengkap" required></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="tanggalLahir">Tanggal Lahir</label>
                            <input type="date" id="tanggalLahir" required>
                        </div>
                        <div class="form-group">
                            <label for="jenisKelamin">Jenis Kelamin</label>
                            <select id="jenisKelamin" required>
                                <option value="" disabled selected>Pilih Jenis Kelamin</option>
                                <option value="Laki-laki">Laki-laki</option>
                                <option value="Perempuan">Perempuan</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" id="btnSubmit" class="btn btn-primary">Simpan Data</button>
                        <button type="button" id="btnCancel" class="btn btn-secondary" style="display: none;">Batal</button>
                    </div>
                </form>
            </div>
        </section>

        <section class="list-section">
            <div class="card">
                <h2>Daftar Data KTP</h2>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>No. KTP</th>
                                <th>Nama Lengkap</th>
                                <th>Alamat</th>
                                <th>Tanggal Lahir</th>
                                <th>Jenis Kelamin</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="ktpTableBody">
                            <!-- Data akan dimuat di sini menggunakan JQuery -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <!-- Notification Container -->
    <div id="notification" class="notification"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
